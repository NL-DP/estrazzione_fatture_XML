name: Build multipiattaforma con Nuitka

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: FattureXML-windows.exe
          - os: ubuntu-latest
            asset_name: FattureXML-linux
          - os: macos-latest
            asset_name: FattureXML-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout sorgente
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze di sistema (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y patchelf ccache

      - name: Installa dipendenze Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "nuitka[onefile]" ordered-set zstandard

      - name: Build con Nuitka (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: python -m nuitka --onefile --standalone --follow-imports --include-package=extractor_fatture --include-package=openpyxl --include-package=et_xmlfile --windows-console-mode=attach --assume-yes-for-downloads --output-filename=FattureXML-windows.exe --output-dir=dist main.py

      - name: Build con Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m nuitka \
            --onefile \
            --standalone \
            --follow-imports \
            --include-package=extractor_fatture \
            --include-package=openpyxl \
            --include-package=et_xmlfile \
            --output-filename=FattureXML-linux \
            --output-dir=dist \
            main.py

      - name: Build con Nuitka (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m nuitka \
            --onefile \
            --standalone \
            --follow-imports \
            --include-package=extractor_fatture \
            --include-package=openpyxl \
            --include-package=et_xmlfile \
            --output-filename=FattureXML-macos \
            --output-dir=dist \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      - name: Pubblica su GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          fail_on_unmatched_files: false