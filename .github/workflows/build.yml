name: Build multipiattaforma

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ================================================================
  #  WINDOWS — Python embedded portatile
  #
  #  Struttura finale per l'utente:
  #
  #  FattureXML/
  #  ├── FattureXML.bat          <- doppio clic
  #  ├── da_analizzare/          <- metti qui gli XML
  #  ├── analizzati/             <- creata automaticamente
  #  ├── errori/                 <- creata automaticamente
  #  └── _runtime/               <- NON TOCCARE
  #      ├── python/
  #      ├── main.py
  #      └── extractor_fatture/
  #
  # ================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Crea pacchetto portatile
        shell: powershell
        run: |
          $OUT = "FattureXML"
          $RT  = "$OUT\_runtime"
          New-Item -ItemType Directory -Path $RT -Force | Out-Null

          # 1. Scarica Python embeddable ufficiale
          $pyUrl = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          Invoke-WebRequest -Uri $pyUrl -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath "$RT\python"

          # 2. Configura .pth: import site + percorso cartella _runtime
          $pthFile = "$RT\python\python311._pth"
          $content = (Get-Content $pthFile) -replace '#import site','import site'
          $content += ".."
          Set-Content $pthFile -Value $content

          # 3. Installa pip e openpyxl
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile get-pip.py
          & "$RT\python\python.exe" get-pip.py --no-warn-script-location 2>&1 | Out-Null
          & "$RT\python\python.exe" -m pip install openpyxl --no-warn-script-location 2>&1 | Out-Null

          # 4. Rimuovi pip/setuptools/wheel dal pacchetto (non servono all'utente)
          $sitePackages = "$RT\python\Lib\site-packages"
          Remove-Item -Recurse -Force "$sitePackages\pip*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$sitePackages\setuptools*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$sitePackages\wheel*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$sitePackages\_distutils_hack*" -ErrorAction SilentlyContinue
          Remove-Item -Force "$sitePackages\distutils-precedence.pth" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$RT\python\Scripts" -ErrorAction SilentlyContinue

          # 5. Copia codice sorgente in _runtime
          Copy-Item main.py "$RT\"
          Copy-Item -Recurse extractor_fatture "$RT\extractor_fatture"

          # 6. Crea launcher .bat nella root (punta a _runtime)
          $lines = @(
            '@echo off'
            'cd /d "%~dp0"'
            '_runtime\python\python.exe _runtime\main.py %*'
            'pause'
          )
          $lines -join "`r`n" | Out-File -FilePath "$OUT\FattureXML.bat" -Encoding ascii

          # 7. Cartella input
          New-Item -ItemType Directory -Path "$OUT\da_analizzare" -Force | Out-Null

          # 8. Verifica
          Write-Host "=== Struttura ==="
          Get-ChildItem $OUT -Name
          Write-Host "=== _runtime ==="
          Get-ChildItem $RT -Name
          Write-Host "=== Test import ==="
          & "$RT\python\python.exe" -c "from extractor_fatture.config import CARTELLE; print('IMPORT OK')"

          # 9. Zip
          Compress-Archive -Path "$OUT\*" -DestinationPath "FattureXML-windows.zip" -Force
          Write-Host "Creato: FattureXML-windows.zip"

      - name: Smoke test
        shell: cmd
        run: |
          mkdir test_smoke
          powershell -Command "Expand-Archive FattureXML-windows.zip -DestinationPath test_smoke"
          echo === Struttura test_smoke ===
          dir test_smoke /B
          echo === Struttura _runtime ===
          dir test_smoke\_runtime /B
          echo === Contenuto .bat ===
          type test_smoke\FattureXML.bat
          echo === Esecuzione ===
          cd test_smoke
          call FattureXML.bat
          if not exist analizzati (
            echo FAIL: cartelle non create
            exit /b 1
          )
          echo SMOKE TEST WINDOWS OK

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FattureXML-windows.zip
          path: FattureXML-windows.zip

      - name: Pubblica su GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FattureXML-windows.zip
          fail_on_unmatched_files: false

  # ================================================================
  #  MACOS — Python standalone portatile (stessa struttura pulita)
  # ================================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crea pacchetto portatile macOS
        run: |
          set -e
          OUT="FattureXML"
          RT="$OUT/_runtime"
          mkdir -p "$RT"

          # 1. Scarica Python standalone portatile (per l'architettura corretta)
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            PY_URL="https://github.com/indygreg/python-build-standalone/releases/download/20240415/cpython-3.11.9+20240415-aarch64-apple-darwin-install_only.tar.gz"
          else
            PY_URL="https://github.com/indygreg/python-build-standalone/releases/download/20240415/cpython-3.11.9+20240415-x86_64-apple-darwin-install_only.tar.gz"
          fi
          echo "Architettura: $ARCH"
          curl -L -o python-standalone.tar.gz "$PY_URL"
          mkdir -p "$RT/python"
          tar xzf python-standalone.tar.gz -C "$RT/python" --strip-components=1

          # 2. Installa openpyxl
          "$RT/python/bin/python3" -m pip install openpyxl --quiet 2>/dev/null

          # 3. Rimuovi pip/setuptools (non servono)
          SITE="$RT/python/lib/python3.11/site-packages"
          rm -rf "$SITE/pip"* "$SITE/setuptools"* "$SITE/wheel"* "$SITE/_distutils_hack"* 2>/dev/null

          # 4. Copia codice sorgente in _runtime
          cp main.py "$RT/"
          cp -r extractor_fatture "$RT/extractor_fatture"

          # 5. Crea launcher .command nella root
          printf '#!/bin/bash\ncd "$(dirname "$0")"\n./_runtime/python/bin/python3 _runtime/main.py "$@"\n' > "$OUT/FattureXML.command"
          chmod +x "$OUT/FattureXML.command"

          # 6. Cartella input
          mkdir -p "$OUT/da_analizzare"

          # 7. Verifica
          echo "=== Test import ==="
          cd "$RT" && ./python/bin/python3 -c "from extractor_fatture.config import CARTELLE; print('OK')" && cd ../..

          # 8. Zip
          cd "$OUT"
          zip -r ../FattureXML-macos.zip . -x "*.pyc" "*__pycache__*"
          cd ..
          echo "Creato: FattureXML-macos.zip"

      - name: Smoke test
        run: |
          mkdir test_smoke && cd test_smoke
          unzip ../FattureXML-macos.zip
          bash FattureXML.command
          test -d analizzati && echo "SMOKE TEST MACOS OK" || (echo "FAIL" && exit 1)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FattureXML-macos.zip
          path: FattureXML-macos.zip

      - name: Pubblica su GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FattureXML-macos.zip
          fail_on_unmatched_files: false

  # ================================================================
  #  LINUX — Nuitka onefile
  # ================================================================
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y patchelf ccache
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "nuitka>=2.1" ordered-set zstandard

      - name: Build
        run: |
          python -m nuitka \
            --onefile --standalone --follow-imports \
            --include-package=extractor_fatture \
            --include-package=openpyxl \
            --include-package=et_xmlfile \
            --include-package-data=openpyxl \
            --nofollow-import-to=tkinter \
            --nofollow-import-to=matplotlib \
            --nofollow-import-to=numpy \
            --nofollow-import-to=pandas \
            --nofollow-import-to=setuptools \
            --nofollow-import-to=pip \
            --nofollow-import-to=unittest \
            --nofollow-import-to=test \
            --nofollow-import-to=distutils \
            --assume-yes-for-downloads \
            --output-filename=FattureXML-linux \
            --output-dir=dist \
            main.py

      - name: Smoke test
        run: |
          mkdir t && cp dist/FattureXML-linux t/ && cd t && chmod +x FattureXML-linux
          ./FattureXML-linux
          test -d da_analizzare && echo "OK" || (echo "FAIL" && exit 1)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FattureXML-linux
          path: dist/FattureXML-linux

      - name: Pubblica su GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FattureXML-linux
          fail_on_unmatched_files: false
